<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">


</head>

<body>


    <form id="campoFormulario">
        <h1>Formulário de Registro</h1>
        <p>listem</p>
        <div class="form-group">
            <label for="campoNome">Nome</label>
            <input type="text" id="campoNome" class="obrigatorio">
            <span class="error-message"></span>
        </div>

        <div class="form-group">
            <label for="campoEmail">Email</label>
            <input type="email" id="campoEmail" class="obrigatorio">
            <span class="error-message"></span>
        </div>

        <div class="form-group">
            <label for="campoSenha">Senha</label>
            <input type="password" id="campoSenha" class="obrigatorio">
            <span class="error-message"></span>
        </div>
        <div class="form-group">
            <label for="confSenha">Confirmar Senha</label>
            <input type="password" id="confSenha" class="obrigatorio">
            <!-- Inserimos em todos input uma classe, para podermos associar que esses inputs, pertecem ao mesmo grupo, e não para estilização. -->
            <span class="error-message"></span>
        </div>



        <button type="submit">
            Enviar
        </button>




    </form>
</body>

<script src="aula01.js"></script>

</html>
